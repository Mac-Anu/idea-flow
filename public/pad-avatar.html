<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GitHub 头像无损填充器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0d1117; color: #c9d1d9; }
        .container { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 400px; }
        input[type="file"] { display: none; }
        .upload-btn { background: #238636; color: #ffffff; padding: 12px 24px; border-radius: 6px; border: 1px solid rgba(240,246,252,0.1); cursor: pointer; font-weight: 600; font-size: 16px; transition: background 0.2s; display: inline-block; }
        .upload-btn:hover { background: #2ea043; }
        canvas { max-width: 200px; margin-top: 30px; border-radius: 50%; border: 4px solid #30363d; display: none; }
        p { color: #8b949e; margin-bottom: 30px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-top: 0; color: #f0f6fc;">GitHub 头像拯救计划</h2>
        <p>因为 GitHub 是圆形裁剪框，三角形的边角很容易被切掉。<br><br>点击下方按钮选择您的原图，我会自动在它周围加上完美的白色留白（Padding），并直接帮您下载好！</p>
        <label class="upload-btn">
            选择原图并自动处理
            <input type="file" id="upload" accept="image/*">
        </label>
        <canvas id="canvas" title="这是处理后在 GitHub 上的圆形效果预览"></canvas>
    </div>

    <script>
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 扩大画布比例 1.4 倍，留出完美边距，保证四个角都不被切
                    const paddingFactor = 1.45;
                    const size = Math.max(img.width, img.height) * paddingFactor;
                    
                    canvas.width = size;
                    canvas.height = size;
                    
                    // 填充白色背景
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, size, size);
                    
                    // 居中绘制原图
                    const x = (size - img.width) / 2;
                    const y = (size - img.height) / 2;
                    ctx.drawImage(img, x, y);
                    
                    // 显示圆形预览
                    canvas.style.display = 'block';
                    
                    // 自动下载
                    const link = document.createElement('a');
                    link.download = 'mac_anu_avatar_perfect.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
